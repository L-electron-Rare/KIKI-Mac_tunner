# Qwen3.5-27B-Opus-v2 — Deja distille Claude Opus 4.6, 14K samples (Mars 2026)
# Fine-tune supplementaire sur notre dataset elargi
model: models/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
data: data/combined-opus-20k
train: true
fine_tune_type: lora
optimizer: adamw
num_layers: -1
lora_parameters:
  rank: 64
  scale: 2.0
  dropout: 0.05
batch_size: 2
iters: 625
val_batches: 10
learning_rate: 1e-5
steps_per_report: 5
steps_per_eval: 50
save_every: 50
grad_accumulation_steps: 4
max_seq_length: 4096
grad_checkpoint: true
adapter_path: output/qwen35-27b-opus-v3
seed: 42
