# Qwen3.5-35B-A3B-Opus — fine-tune final sur dataset distille + Opus
# MoE 35B (3B actifs), deja distille Opus, affinage supplementaire
model: models/Qwen3.5-35B-A3B-Opus-bf16
data: data/final-opus-distilled
train: true
fine_tune_type: lora
optimizer: adamw
num_layers: -1
lora_parameters:
  rank: 64
  scale: 2.0
  dropout: 0.05
batch_size: 2
iters: 1000
val_batches: 10
learning_rate: 1e-5
steps_per_report: 5
steps_per_eval: 50
save_every: 50
grad_accumulation_steps: 4
max_seq_length: 2048
grad_checkpoint: true
adapter_path: output/qwen35-35b-opus-final
seed: 42
