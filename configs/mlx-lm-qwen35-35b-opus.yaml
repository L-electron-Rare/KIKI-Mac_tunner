# Qwen3.5-35B-A3B-Opus — MoE 35B (3B actifs), distille Claude Opus 4.6 (Mars 2026)
# Tres leger en inference (~70 Go bf16), ideal pour iteration rapide
model: models/Qwen3.5-35B-A3B-Opus-bf16
data: data/combined-opus-20k
train: true
fine_tune_type: lora
optimizer: adamw
num_layers: -1
lora_parameters:
  rank: 64
  scale: 2.0
  dropout: 0.05
batch_size: 4
iters: 312
val_batches: 10
learning_rate: 2e-5
steps_per_report: 5
steps_per_eval: 50
save_every: 50
grad_accumulation_steps: 2
max_seq_length: 4096
grad_checkpoint: true
adapter_path: output/qwen35-35b-opus-v3
seed: 42
