# Qwen3.5-27B — bf16 full precision LoRA
# Target: Mac Studio M4 Pro 512 Go (or any machine with 64+ GB)
# Estimated RAM: ~55 GB | Training time: ~4-8 hours

model_id: Qwen/Qwen3.5-27B
dataset_id: nohurry/Opus-4.6-Reasoning-3000x-filtered

# LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules: all-linear

# Training
precision: bf16
num_epochs: 3
batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
weight_decay: 0.01
warmup_ratio: 0.03
lr_scheduler: cosine
max_seq_length: 4096

# Checkpoints
save_every: 100
save_total_limit: 3

# Output
output_dir: output/qwen-27b-opus
