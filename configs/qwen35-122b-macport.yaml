# Qwen3.5-122B-A10B-BF16 LoRA — mac-port Quality+ profile
# Studio M3 Ultra 512 GB — wired-limit 448 GiB, mmap safetensors, grad-checkpoint ON
# 12 keys: 9 attention (self_attn + linear_attn) + 3 shared_expert MLP (dense, no 256 MoE experts)
# rank 128 / scale 128 / warmup 250 / 5000 iters = 3.37 epochs on 11880 train samples

model: /Users/clems/KIKI-Mac_tunner/models/Qwen3.5-122B-A10B-BF16
train: true
data: /Users/clems/KIKI-Mac_tunner/data/final-opus-v3-1
adapter_path: /Users/clems/KIKI-Mac_tunner/output/qwen35-122b-macport

fine_tune_type: lora
num_layers: -1

lora_parameters:
  rank: 128
  scale: 128.0
  dropout: 0.01
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "linear_attn.in_proj_a"
    - "linear_attn.in_proj_b"
    - "linear_attn.in_proj_qkv"
    - "linear_attn.in_proj_z"
    - "linear_attn.out_proj"
    - "mlp.shared_expert.gate_proj"
    - "mlp.shared_expert.up_proj"
    - "mlp.shared_expert.down_proj"

optimizer: adamw
learning_rate: 8.0e-6
lr_schedule:
  name: cosine_decay
  warmup: 250
  arguments: [8.0e-6, 5000, 8.0e-7]

batch_size: 1
grad_accumulation_steps: 8
iters: 5000
max_seq_length: 2048
grad_checkpoint: true
mask_prompt: true

lazy: true
seed: 42

clear_cache_threshold: 10
save_every: 100
steps_per_eval: 250
steps_per_report: 10
val_batches: 20
