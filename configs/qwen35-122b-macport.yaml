# Qwen3.5-122B-A10B-BF16 LoRA — mac-port attention+linear_attn BOOSTED + cache-clear
# 9 keys across 49 transformer blocks (13 full_attn + 36 linear_attn), no MoE experts.
# clear_cache_threshold=10 to prevent Metal cache growth (fixed silent jetsam at iter 22).

model: /Users/clems/KIKI-Mac_tunner/models/Qwen3.5-122B-A10B-BF16
train: true
data: /Users/clems/KIKI-Mac_tunner/data/final-opus-v3-1
adapter_path: /Users/clems/KIKI-Mac_tunner/output/qwen35-122b-macport

fine_tune_type: lora
num_layers: -1

lora_parameters:
  rank: 64
  scale: 64.0
  dropout: 0.01
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "linear_attn.in_proj_a"
    - "linear_attn.in_proj_b"
    - "linear_attn.in_proj_qkv"
    - "linear_attn.in_proj_z"
    - "linear_attn.out_proj"

optimizer: adamw
learning_rate: 8.0e-6
lr_schedule:
  name: cosine_decay
  warmup: 100
  arguments: [8.0e-6, 3000, 8.0e-7]

batch_size: 1
grad_accumulation_steps: 8
iters: 3000
max_seq_length: 2048
grad_checkpoint: true
mask_prompt: true

lazy: true
seed: 42

clear_cache_threshold: 10
save_every: 100
steps_per_eval: 250
steps_per_report: 10
val_batches: 20
